name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'app/*'
      - 'Dockerfile*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (alpine)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/twc3teslamate:latest,ghcr.io/${{ github.repository_owner }}/twc3teslamate:alpine

      - name: Build and push (debian)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.debian
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/twc3teslamate:debian
